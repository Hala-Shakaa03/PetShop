<body class="login-page">

<div class="login-container">
    <h2>Login</h2>

    <div class="login-options">
        <label>
            <input type="radio" name="loginType" value="email" checked onclick="toggleLogin()"> Login with Email
        </label>

        <label>
            <input type="radio" name="loginType" value="username" onclick="toggleLogin()"> Login with Username
        </label>
    </div>

    <form>
        <input type="email" id="emailField" placeholder="Enter your Email" required>

        <input type="text" id="usernameField" placeholder="Enter your Username" style="display:none;">

        <input type="password" placeholder="Password" required>

        <button type="submit">Login</button>
    </form>
</div>

<script>
    function toggleLogin() {
        const emailField = document.getElementById("emailField");
        const usernameField = document.getElementById("usernameField");
        const selected = document.querySelector('input[name="loginType"]:checked').value;

        if (selected === "email") {
            emailField.style.display = "block";
            usernameField.style.display = "none";
            emailField.required = true;
            usernameField.required = false;
        } else {
            emailField.style.display = "none";
            usernameField.style.display = "block";
            emailField.required = false;
            usernameField.required = true;
        }
    }
</script>

<button onclick="history.back()" class="back-btn">⬅ Back</button>
